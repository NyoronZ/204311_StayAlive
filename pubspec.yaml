name: stayalive
description: "A CPR and Emergency assistance application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8  
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  audioplayers: ^6.5.1
  url_launcher: ^6.3.2
  flutter_local_notifications: ^21.0.0
  geolocator: ^14.0.2
  http: ^1.6.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  # google_fonts: ^6.1.0 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/stayalive_logo.png
    - assets/images/stayalive_logo_dark.png
    - assets/images/cpr.png
    - assets/images/breath.png
    - assets/images/cpr_infant.png
    - assets/images/breath_infant.png
    - assets/audio/
    - assets/images/people_in_med.png
    - assets/images/cropped_app_logo.png
  #   - assets/images/heartbeat.png

  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf
  #       - asset: assets/fonts/Roboto-Bold.ttf
  #         weight: 700

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo2.png"